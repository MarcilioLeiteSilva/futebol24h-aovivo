<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Placar Ao Vivo – Copa do Mundo FIFA 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { overflow:hidden; }
    .placar-page { min-height:100vh; display:flex; flex-direction:column; }

    .page-title { text-align:center; padding:28px 24px 16px; }
    .page-title h1 { font-family:var(--font-disp); font-size:clamp(2rem,4vw,3rem); letter-spacing:.12em; color:var(--gold); margin:0 0 4px; text-shadow:0 0 30px rgba(255,215,0,.4); }
    .page-title p  { font-size:.7rem; letter-spacing:.3em; color:var(--subtext); }

    /* live match spotlight */
    .live-spotlight {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      flex:1; padding:0 32px 20px; gap:20px;
    }

    .no-live {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; min-height:300px; color:var(--subtext); text-align:center;
    }
    .no-live .icon { font-size:3rem; }
    .no-live h2 { font-family:var(--font-disp); font-size:2rem; color:var(--gold); margin:0; }
    .no-live p  { font-size:.8rem; max-width:400px; line-height:1.6; }

    /* main score card */
    .score-card {
      background:rgba(255,255,255,.04); border:2px solid rgba(200,16,46,.5);
      border-radius:24px; padding:32px 48px; width:100%; max-width:800px;
      backdrop-filter:blur(16px);
      box-shadow:0 0 60px rgba(200,16,46,.2),inset 0 0 40px rgba(200,16,46,.04);
      animation:livePulseCard 2s ease-in-out infinite;
    }
    @keyframes livePulseCard{0%,100%{box-shadow:0 0 40px rgba(200,16,46,.2)}50%{box-shadow:0 0 80px rgba(200,16,46,.4)}}

    .score-card-header {
      display:flex; align-items:center; justify-content:center; gap:10px;
      margin-bottom:24px;
    }
    .live-badge {
      display:flex; align-items:center; gap:6px;
      background:var(--red); border-radius:50px; padding:4px 14px;
      font-family:var(--font-head); font-size:.65rem; font-weight:900; letter-spacing:.2em; color:#fff;
    }
    .live-dot-sm { width:6px; height:6px; border-radius:50%; background:#fff; animation:livePulse 1s ease-in-out infinite; }
    .elapsed-badge {
      font-family:var(--font-head); font-size:.8rem; font-weight:700; color:var(--gold);
      background:rgba(255,215,0,.1); border:1px solid rgba(255,215,0,.3); border-radius:50px; padding:4px 14px;
    }

    .scoreboard {
      display:grid; grid-template-columns:1fr 200px 1fr; align-items:center; gap:20px;
    }
    .score-team { display:flex; flex-direction:column; align-items:center; gap:10px; }
    .score-team.away { }
    .score-logo { width:80px; height:80px; object-fit:contain; filter:drop-shadow(0 0 16px rgba(255,255,255,.25)); }
    .score-team-name { font-family:var(--font-disp); font-size:1.8rem; letter-spacing:.06em; color:var(--text); text-align:center; }
    .score-team-code { font-family:var(--font-head); font-size:.65rem; font-weight:700; letter-spacing:.2em; color:var(--subtext); }

    .score-center { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .score-numbers {
      font-family:var(--font-head); font-size:5rem; font-weight:900; color:#fff;
      letter-spacing:.05em; text-shadow:0 0 30px rgba(255,255,255,.3);
      line-height:1;
    }
    .score-dash { color:rgba(255,255,255,.3); }

    .score-meta { font-family:var(--font-body); font-size:.7rem; color:var(--subtext); text-align:center; line-height:1.6; }

    /* next matches strip */
    .next-strip { width:100%; max-width:800px; }
    .next-strip-title { font-family:var(--font-head); font-size:.65rem; font-weight:700; letter-spacing:.2em; color:var(--gold); margin-bottom:10px; padding-left:4px; }
    .next-list { display:flex; flex-direction:column; gap:8px; }
    .next-item {
      background:rgba(255,255,255,.04); border:1px solid rgba(255,215,0,.12); border-radius:12px;
      padding:10px 16px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px;
    }
    .next-team { display:flex; align-items:center; gap:8px; }
    .next-team.right { flex-direction:row-reverse; }
    .next-logo { width:24px; height:24px; object-fit:contain; }
    .next-name { font-size:.8rem; font-weight:600; color:var(--text); }
    .next-center { display:flex; flex-direction:column; align-items:center; font-family:var(--font-head); }
    .next-time { font-size:.8rem; font-weight:700; color:var(--gold); }
    .next-date { font-size:.58rem; color:var(--subtext); }
    .next-vs { font-size:.7rem; color:var(--subtext); }

    .spinner { width:36px; height:36px; border:3px solid rgba(255,215,0,.2); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto; }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <div class="scanlines"></div>

  <header class="top-bar">
    <div class="top-bar__left">
      <div class="fifa-badge"><span class="fifa-badge__top">FIFA</span><span class="fifa-badge__mid">⚽</span><span class="fifa-badge__bot">WORLD CUP</span></div>
      <div class="host-flags"><span class="flag">🇺🇸</span><span class="flag">🇨🇦</span><span class="flag">🇲🇽</span><span class="host-label">2026</span></div>
    </div>
    <div class="clocks-panel">
      <div class="clock-card"><span class="clock-card__flag">🇺🇸</span>
        <div class="clock-card__info">
          <span class="clock-card__label">NEW YORK / ET</span>
          <span class="clock-card__time" id="time-usa">--:--:--</span>
          <span class="clock-card__date" id="date-usa">-- --- ----</span>
        </div>
      </div>
      <div class="clock-divider"></div>
      <div class="clock-card"><span class="clock-card__flag">🇧🇷</span>
        <div class="clock-card__info">
          <span class="clock-card__label">BRASÍLIA / BRT</span>
          <span class="clock-card__time" id="time-bra">--:--:--</span>
          <span class="clock-card__date" id="date-bra">-- --- ----</span>
        </div>
      </div>
    </div>
  </header>

  <div class="placar-page">
    <div class="page-title">
      <h1>🔴 PLACAR AO VIVO</h1>
      <p>COPA DO MUNDO FIFA 2026 · ATUALIZAÇÃO AUTOMÁTICA 30s</p>
    </div>

    <div class="live-spotlight" id="spotlight">
      <div class="spinner"></div>
    </div>
  </div>

  <footer class="footer">
    <span>© 2026 Copa do Mundo FIFA · Placar Oficial</span>
    <span class="footer-live"><span class="live-dot"></span> AO VIVO</span>
  </footer>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    function pad(n){return String(n).padStart(2,'0');}
    function zoneDate(off){const n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*6e4+off*36e5);}
    function updateClocks(){
      const u=zoneDate(-4),b=zoneDate(-3);
      document.getElementById('time-usa').textContent=`${pad(u.getHours())}:${pad(u.getMinutes())}:${pad(u.getSeconds())}`;
      document.getElementById('date-usa').textContent=`${DAYS[u.getDay()]}, ${pad(u.getDate())} ${MONTHS[u.getMonth()]} ${u.getFullYear()}`;
      document.getElementById('time-bra').textContent=`${pad(b.getHours())}:${pad(b.getMinutes())}:${pad(b.getSeconds())}`;
      document.getElementById('date-bra').textContent=`${DAYS[b.getDay()]}, ${pad(b.getDate())} ${MONTHS[b.getMonth()]} ${b.getFullYear()}`;
    }
    updateClocks(); setInterval(updateClocks,1000);

    async function renderPlacar(){
      try{
        const todayAll=await API.getTodayFixtures();
        const live=todayAll.filter(f=>API.isLive(f.statusShort));
        const done=todayAll.filter(f=>API.isFinished(f.statusShort));
        const upcoming=await API.getUpcomingFixtures(4);
        const spot=document.getElementById('spotlight');

        if(live.length){
          // Show all live matches
          spot.innerHTML='';
          live.forEach(f=>{
            const card=document.createElement('div');
            card.className='score-card';
            card.innerHTML=`
              <div class="score-card-header">
                <div class="live-badge"><div class="live-dot-sm"></div> AO VIVO</div>
                <div class="elapsed-badge">${f.statusShort==='HT'?'Intervalo':`${f.elapsed||0}'`}</div>
              </div>
              <div class="scoreboard">
                <div class="score-team">
                  <img class="score-logo" src="${f.homeTeam.logo}" onerror="this.style.opacity=.3">
                  <div class="score-team-name">${f.homeTeam.name}</div>
                  <div class="score-team-code">${f.homeTeam.code}</div>
                </div>
                <div class="score-center">
                  <div class="score-numbers">${f.homeGoals??0}<span class="score-dash"> – </span>${f.awayGoals??0}</div>
                  <div class="score-meta">
                    ${f.round}<br>
                    📍 ${f.venueName||''} · ${f.venueCity||''}
                  </div>
                </div>
                <div class="score-team">
                  <img class="score-logo" src="${f.awayTeam.logo}" onerror="this.style.opacity=.3">
                  <div class="score-team-name">${f.awayTeam.name}</div>
                  <div class="score-team-code">${f.awayTeam.code}</div>
                </div>
              </div>`;
            spot.appendChild(card);
          });

          // Show today's done matches below
          if(done.length){
            const doneWrap=document.createElement('div');
            doneWrap.className='next-strip';
            doneWrap.innerHTML=`<div class="next-strip-title">RESULTADOS DE HOJE</div><div class="next-list">${
              done.map(f=>`
                <div class="next-item">
                  <div class="next-team"><img class="next-logo" src="${f.homeTeam.logo}"><span class="next-name">${f.homeTeam.name}</span></div>
                  <div class="next-center"><div class="next-time">${f.homeGoals} – ${f.awayGoals}</div><div class="next-date">FT</div></div>
                  <div class="next-team right"><img class="next-logo" src="${f.awayTeam.logo}"><span class="next-name">${f.awayTeam.name}</span></div>
                </div>`).join('')
            }</div>`;
            spot.appendChild(doneWrap);
          }

        } else {
          // No live — show today results + next upcoming
          spot.innerHTML='';
          if(done.length){
            const doneWrap=document.createElement('div');
            doneWrap.className='next-strip';
            doneWrap.innerHTML=`<div class="next-strip-title">📋 RESULTADOS DE HOJE</div><div class="next-list">${
              done.map(f=>`
                <div class="next-item">
                  <div class="next-team"><img class="next-logo" src="${f.homeTeam.logo}"><span class="next-name">${f.homeTeam.name}</span></div>
                  <div class="next-center"><div class="next-time">${f.homeGoals} – ${f.awayGoals}</div><div class="next-date">Encerrado</div></div>
                  <div class="next-team right"><img class="next-logo" src="${f.awayTeam.logo}"><span class="next-name">${f.awayTeam.name}</span></div>
                </div>`).join('')
            }</div>`;
            spot.appendChild(doneWrap);
          }

          const noLive=document.createElement('div');
          noLive.className='no-live';
          noLive.innerHTML=`<div class="icon">⏳</div><h2>Sem Jogos ao Vivo</h2><p>Aguardando início das partidas de hoje. A página atualiza automaticamente a cada 30 segundos.</p>`;
          spot.appendChild(noLive);

          if(upcoming.length){
            const nextWrap=document.createElement('div');
            nextWrap.className='next-strip';
            nextWrap.innerHTML=`<div class="next-strip-title">📅 PRÓXIMOS JOGOS</div><div class="next-list">${
              upcoming.map(f=>`
                <div class="next-item">
                  <div class="next-team"><img class="next-logo" src="${f.homeTeam.logo}"><span class="next-name">${f.homeTeam.name}</span></div>
                  <div class="next-center">
                    <div class="next-time">🇧🇷 ${API.toBrazilTime(f.date)}</div>
                    <div class="next-date">${API.toDisplayDate(f.date)}</div>
                  </div>
                  <div class="next-team right"><img class="next-logo" src="${f.awayTeam.logo}"><span class="next-name">${f.awayTeam.name}</span></div>
                </div>`).join('')
            }</div>`;
            spot.appendChild(nextWrap);
          }
        }
      }catch(e){
        document.getElementById('spotlight').innerHTML=`<div class="no-live"><div class="icon">⚠️</div><h2>Erro</h2><p>${e.message}</p></div>`;
      }
    }

    renderPlacar();
    setInterval(renderPlacar, CONFIG.REFRESH_INTERVAL);

    const cv=document.getElementById('particleCanvas'),ctx2=cv.getContext('2d');let W,H,pts=[];
    function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
    function mkPt(){return{x:Math.random()*W,y:H+10,vx:(Math.random()-.5)*.5,vy:-(Math.random()*.5+.3),a:Math.random()*.3+.08,s:Math.random()*10+5,r:0,rs:(Math.random()-.5)*.02};}
    function animPts(){ctx2.clearRect(0,0,W,H);if(pts.length<25)pts.push(mkPt());pts.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.r+=p.rs;p.a-=.0005;ctx2.save();ctx2.globalAlpha=Math.max(0,p.a);ctx2.translate(p.x,p.y);ctx2.rotate(p.r);ctx2.font=`${p.s}px serif`;ctx2.fillText('⚽',0,0);ctx2.restore();if(p.y<-20||p.a<=0)pts.splice(i,1);});requestAnimationFrame(animPts);}
    window.addEventListener('resize',resize);resize();animPts();
  </script>
</body>
</html>
