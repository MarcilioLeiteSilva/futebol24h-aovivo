<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda de Jogos – Futebol Brasileiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { overflow-x: hidden; }
    .page-wrap { display:flex; flex-direction:column; min-height:calc(100vh - 140px); padding-bottom:80px; }

    .page-title { text-align:center; padding:32px 24px 16px; }
    .page-title h1 { font-family:var(--font-disp); font-size:clamp(2rem,5vw,3.5rem); letter-spacing:.1em; color:var(--gold); margin:0 0 6px; text-shadow:0 0 30px rgba(255,215,0,.4); }
    .page-title p  { font-size:.75rem; letter-spacing:.3em; color:var(--subtext); }

    /* date nav */
    .date-nav { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:0 24px 20px; }
    .date-btn {
      font-family:var(--font-body); font-size:.7rem; font-weight:700; letter-spacing:.08em;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,215,0,.2); border-radius:50px;
      color:var(--subtext); padding:8px 16px; cursor:pointer; transition:all .2s;
    }
    .date-btn:hover,.date-btn.active { background:rgba(255,215,0,.15); border-color:var(--gold); color:var(--gold); }

    /* fixtures */
    .fixtures-wrap { padding:0 32px; max-width:1100px; margin:0 auto; width:100%; }

    .round-header {
      font-family:var(--font-head); font-size:.65rem; font-weight:900; letter-spacing:.25em;
      color:var(--gold); padding:20px 0 10px; display:flex; align-items:center; gap:12px;
    }
    .round-header::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(255,215,0,.3),transparent); }

    .fixture-card {
      background:rgba(255,255,255,.04); border:1px solid rgba(255,215,0,.13); border-radius:16px;
      padding:14px 20px; display:grid; grid-template-columns:1fr 140px 1fr; align-items:center;
      gap:12px; margin-bottom:10px; backdrop-filter:blur(10px);
      transition:transform .2s,box-shadow .2s,border-color .2s;
    }
    .fixture-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(255,215,0,.1); border-color:rgba(255,215,0,.3); }
    .fixture-card.is-live { border-color:var(--red); box-shadow:0 0 20px rgba(200,16,46,.3); animation:liveGlow 2s ease-in-out infinite; }
    .fixture-card.is-done { opacity:.6; }

    @keyframes liveGlow { 0%,100%{box-shadow:0 0 15px rgba(200,16,46,.25)} 50%{box-shadow:0 0 35px rgba(200,16,46,.55)} }

    .team-side { display:flex; align-items:center; gap:12px; }
    .team-side.away { flex-direction:row-reverse; text-align:right; }
    .team-logo { width:42px; height:42px; object-fit:contain; filter:drop-shadow(0 0 5px rgba(255,255,255,.15)); flex-shrink:0; }
    .team-info { display:flex; flex-direction:column; gap:2px; }
    .team-name { font-weight:700; font-size:.88rem; color:var(--text); line-height:1.2; }
    .team-code { font-family:var(--font-head); font-size:.58rem; font-weight:700; letter-spacing:.15em; color:var(--subtext); }

    .match-center { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .score { font-family:var(--font-head); font-size:2.2rem; font-weight:900; color:#fff; letter-spacing:.08em; }
    .time-block { display:flex; flex-direction:column; align-items:center; gap:2px; }
    .time-brt { font-family:var(--font-head); font-size:.9rem; font-weight:700; color:var(--gold); }
    .time-et  { font-size:.6rem; color:var(--subtext); }
    .status-tag {
      font-family:var(--font-body); font-size:.62rem; font-weight:700; letter-spacing:.15em;
      color:var(--subtext); text-transform:uppercase;
    }
    .status-tag.live { color:var(--red); animation:blink 1s step-end infinite; }
    .venue-tag { font-size:.58rem; color:var(--subtext); text-align:center; }

    .loading-state { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:250px; gap:16px; color:var(--subtext); }
    .spinner { width:36px; height:36px; border:3px solid rgba(255,215,0,.2); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* highlight brasil */
    .fixture-card.brasil-match { border-color:rgba(0,155,58,.5); background:rgba(0,155,58,.05); }
    .fixture-card.brasil-match:hover { border-color:var(--green); }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <div class="scanlines"></div>

  <header class="top-bar">
    <div class="top-bar__left">
      <div class="fifa-badge" style="border-color: #009b3a;"><span class="fifa-badge__top" style="color: #ffdf00;">BRASIL</span><span class="fifa-badge__mid">⚽</span><span class="fifa-badge__bot" style="color: #fff;">AO VIVO</span></div>
      <div class="host-flags">
        <span class="flag" title="Série A">🏆</span><span class="flag" title="Série B">🥈</span><span class="flag" title="Copa do Brasil">🇧🇷</span>
        <span class="host-label">24H</span>
      </div>
    </div>
    <div class="clocks-panel">
      <div class="clock-card"><span class="clock-card__flag">🌎</span>
        <div class="clock-card__info">
          <span class="clock-card__label">SEU HORÁRIO</span>
          <span class="clock-card__time" id="time-usa">--:--:--</span>
          <span class="clock-card__date" id="date-usa">-- --- ----</span>
        </div>
      </div>
      <div class="clock-divider"></div>
      <div class="clock-card"><span class="clock-card__flag">🇧🇷</span>
        <div class="clock-card__info">
          <span class="clock-card__label">BRASÍLIA / BRT</span>
          <span class="clock-card__time" id="time-bra">--:--:--</span>
          <span class="clock-card__date" id="date-bra">-- --- ----</span>
        </div>
      </div>
    </div>
  </header>

  <div class="page-wrap">
    <div class="page-title">
      <h1>📅 AGENDA DE JOGOS</h1>
      <p>CAMPEONATOS NACIONAIS · CRONOGRAMA DE TRANSMISSÕES AO VIVO</p>
    </div>
    <div class="league-nav" id="leagueNav" style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:0 24px 12px;"></div>
    <div class="date-nav" id="dateNav"></div>
    <div class="fixtures-wrap">
      <div class="loading-state" id="fixturesList">
        <div class="spinner"></div>
        <span>Carregando agenda completa...</span>
      </div>
    </div>
  </div>

  <footer class="footer">
    <span>© 2026 Futebol Brasileiro · Série A, Série B, Copas · Transmissão 24h</span>
    <span class="footer-live"><span class="live-dot"></span> AO VIVO</span>
  </footer>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    // ── clocks ──────────────────────────────────────────────
    const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    function pad(n){return String(n).padStart(2,'0');}
    function zoneDate(off){const n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*6e4+off*36e5);}
    function updateClocks(){
      const local=new Date(),b=zoneDate(-3);
      const lTime = document.getElementById('time-usa');
      const lDate = document.getElementById('date-usa');
      if (lTime) lTime.textContent=`${pad(local.getHours())}:${pad(local.getMinutes())}:${pad(local.getSeconds())}`;
      if (lDate) lDate.textContent=`${DAYS[local.getDay()]}, ${pad(local.getDate())} ${MONTHS[local.getMonth()]} ${local.getFullYear()}`;
      document.getElementById('time-bra').textContent=`${pad(b.getHours())}:${pad(b.getMinutes())}:${pad(b.getSeconds())}`;
      document.getElementById('date-bra').textContent=`${DAYS[b.getDay()]}, ${pad(b.getDate())} ${MONTHS[b.getMonth()]} ${b.getFullYear()}`;
    }
    updateClocks(); setInterval(updateClocks,1000);

    // ── agenda ──────────────────────────────────────────────
    let allFixtures=[], selectedDate=null, selectedLeagueId = 'ALL';

    function getFilteredFixtures() {
      if (selectedLeagueId === 'ALL') return allFixtures;
      return allFixtures.filter(f => f.league && f.league.externalId === Number(selectedLeagueId));
    }

    function brtDateStr(utcStr){
      return new Date(utcStr).toLocaleDateString('pt-BR',{timeZone:'America/Sao_Paulo',year:'numeric',month:'2-digit',day:'2-digit'});
    }

    function buildLeagueNav() {
      const nav = document.getElementById('leagueNav');
      if (!nav) return;
      nav.innerHTML = '';
      
      const btnAll = document.createElement('button');
      btnAll.className = 'date-btn' + (selectedLeagueId === 'ALL' ? ' active' : '');
      btnAll.textContent = 'TODOS';
      btnAll.onclick = () => {
        selectedLeagueId = 'ALL';
        selectedDate = null;
        buildLeagueNav();
        buildDateNav();
        renderFixtures();
      };
      nav.appendChild(btnAll);

      CONFIG.LEAGUES.forEach(league => {
        const btn = document.createElement('button');
        btn.className = 'date-btn' + (selectedLeagueId === league.id ? ' active' : '');
        btn.textContent = league.name.toUpperCase();
        btn.onclick = () => {
          selectedLeagueId = league.id;
          selectedDate = null;
          buildLeagueNav();
          buildDateNav();
          renderFixtures();
        };
        nav.appendChild(btn);
      });
    }

    function buildDateNav(){
      const nav=document.getElementById('dateNav');
      const filtered = getFilteredFixtures();
      const dates=[...new Set(filtered.map(f=>brtDateStr(f.date)))].sort((a,b)=>{
        const [d1,m1,y1]=a.split('/'); const [d2,m2,y2]=b.split('/');
        return new Date(`${y1}-${m1}-${d1}`) - new Date(`${y2}-${m2}-${d2}`);
      });
      if(!dates.length) {
        nav.innerHTML = '';
        selectedDate = null;
        return;
      }
      if(!selectedDate || !dates.includes(selectedDate)){
        const today=brtDateStr(new Date().toISOString());
        selectedDate=dates.includes(today)?today:dates[0];
      }
      const idx=dates.indexOf(selectedDate);
      const start=Math.max(0,idx-4), end=Math.min(dates.length-1,idx+4);
      nav.innerHTML='';
      dates.slice(start,end+1).forEach(ds=>{
        const [d,m,y]=ds.split('/');
        const lbl=new Date(`${y}-${m}-${d}`).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
        const btn=document.createElement('button');
        btn.className='date-btn'+(ds===selectedDate?' active':'');
        btn.textContent=lbl.toUpperCase();
        btn.onclick=()=>{selectedDate=ds;buildDateNav();renderFixtures();};
        nav.appendChild(btn);
      });
    }

    function renderFixtures(){
      const wrap=document.getElementById('fixturesList');
      const filtered = getFilteredFixtures();
      const day=filtered
        .filter(f=>selectedDate === null || brtDateStr(f.date)===selectedDate)
        .sort((a,b)=>new Date(a.date)-new Date(b.date));

      if(!day.length){wrap.innerHTML='<div class="loading-state"><span>Sem jogos cadastrados nesta data.</span></div>';return;}

      wrap.innerHTML='';
      const rounds={};
      day.forEach(f=>{
        const groupName = `${f.league?.name || 'Geral'} – ${f.round || ''}`;
        if(!rounds[groupName])rounds[groupName]=[];
        rounds[groupName].push(f);
      });

      Object.entries(rounds).forEach(([round,fixtures])=>{
        const rh=document.createElement('div');
        rh.className='round-header';
        rh.textContent=round.replace('Group Stage','Fase de Grupos').replace('Regular Season','Rodada').replace('-','–').toUpperCase();
        wrap.appendChild(rh);

        fixtures.forEach(f=>{
          const live=API.isLive(f.statusShort);
          const done=API.isFinished(f.statusShort);
          const hasScore=f.homeGoals!==null&&f.awayGoals!==null;
          
          const isHighlight = (CONFIG.HIGHLIGHT_TEAMS || []).some(team => 
            (f.homeTeam?.name && f.homeTeam.name.toLowerCase().includes(team.toLowerCase())) || 
            (f.awayTeam?.name && f.awayTeam.name.toLowerCase().includes(team.toLowerCase()))
          );

          const card=document.createElement('div');
          card.className='fixture-card'+(live?' is-live':'')+(done?' is-done':'')+(isHighlight?' brasil-match':'');

          card.innerHTML=`
            <div class="team-side">
              <img class="team-logo" src="${f.homeTeam.logo}" alt="${f.homeTeam.name}" onerror="this.style.opacity=.3">
              <div class="team-info">
                <div class="team-name">${f.homeTeam.name}</div>
                <div class="team-code">${f.homeTeam.code}</div>
              </div>
            </div>
            <div class="match-center">
              ${hasScore
                ?`<div class="score">${f.homeGoals} – ${f.awayGoals}</div>`
                :`<div class="time-block">
                    <div class="time-brt">🇧🇷 ${API.toBrazilTime(f.date)}</div>
                    <div class="time-et">🇺🇸 ${API.toUSATime(f.date)} ET</div>
                  </div>`
              }
              <div class="status-tag${live?' live':''}">${live?'🔴 ':''}${API.statusLabel(f.statusShort,f.elapsed)}</div>
              <div class="venue-tag">📍 ${f.venueCity||''}</div>
            </div>
            <div class="team-side away">
              <img class="team-logo" src="${f.awayTeam.logo}" alt="${f.awayTeam.name}" onerror="this.style.opacity=.3">
              <div class="team-info">
                <div class="team-name">${f.awayTeam.name}</div>
                <div class="team-code">${f.awayTeam.code}</div>
              </div>
            </div>`;
          wrap.appendChild(card);
        });
      });
    }

    async function init(){
      try{
        allFixtures=await API.getFixtures();
        buildLeagueNav(); buildDateNav(); renderFixtures();
      }catch(e){
        document.getElementById('fixturesList').innerHTML=`<div class="loading-state"><span>⚠️ ${e.message}</span></div>`;
      }
    }
    init();
    setInterval(async()=>{
      try{allFixtures=await API.getFixtures();renderFixtures();}catch(_){}
    }, CONFIG.REFRESH_INTERVAL);

    // particles (lightweight version)
    const cv=document.getElementById('particleCanvas'),ctx2=cv.getContext('2d');
    let W,H,pts=[];
    function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
    function mkPt(){return{x:Math.random()*W,y:H+10,vx:(Math.random()-.5)*.5,vy:-(Math.random()*.5+.2),a:Math.random()*.4+.1,s:Math.random()*10+5,r:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.02};}
    function animPts(){
      ctx2.clearRect(0,0,W,H);
      if(pts.length<40)pts.push(mkPt());
      pts.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.r+=p.rs;p.a-=.0005;
        ctx2.save();ctx2.globalAlpha=Math.max(0,p.a);ctx2.translate(p.x,p.y);ctx2.rotate(p.r);
        ctx2.font=`${p.s}px serif`;ctx2.fillStyle='rgba(255,215,0,.7)';ctx2.fillText('⚽',0,0);
        ctx2.restore();if(p.y<-20||p.a<=0)pts.splice(i,1);
      });requestAnimationFrame(animPts);
    }
    window.addEventListener('resize',resize);resize();animPts();
  </script>
</body>
</html>
